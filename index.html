<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Thermodynamics Simulation - Advanced</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/effects/OutlineEffect.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Updated body background and sketchy font */
        body { margin: 0; overflow: hidden; background-color: #f8fafc; font-family: 'Comic Neue', cursive; touch-action: none; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding-bottom: 2rem; padding-top: 1.5rem; }
        .pointer-events-auto { pointer-events: auto; }
        .eq-term { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s; }
        
        /* --- SKETCHY UI CSS --- */
        .sketchy-panel {
            background-color: #ffffff;
            border: 3px solid #1e293b;
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px;
            box-shadow: 6px 6px 0px #1e293b;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        
        .sketchy-btn {
            background-color: #ffffff;
            border: 3px solid #1e293b;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            box-shadow: 4px 4px 0px #1e293b;
            transition: all 0.1s;
        }
        .sketchy-btn:active:not(:disabled) {
            transform: translate(3px, 3px);
            box-shadow: 1px 1px 0px #1e293b;
        }
        .sketchy-btn:disabled { 
            opacity: 0.4; filter: grayscale(100%); cursor: not-allowed; display: none; 
        }
        
        .mode-btn { transition: all 0.1s; border: 2px solid transparent; }
        .mode-btn:hover { background-color: #f1f5f9; }
        .mode-btn.active { 
            background-color: #cbd5e1; 
            border: 2px solid #1e293b;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            transform: translate(1px, 1px);
            box-shadow: inset 2px 2px 0px rgba(0,0,0,0.1);
        }

        canvas#pv-canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        
        <!-- Top Navigation Area -->
        <div class="w-full flex justify-between items-start px-4 md:px-8 pointer-events-none gap-4">
            
            <!-- Live PV Graph (Left) -->
            <div id="pv-graph-container" class="sketchy-panel w-48 h-40 md:w-64 md:h-48 pointer-events-auto flex flex-col p-3 relative">
                <h3 class="text-slate-800 text-[10px] md:text-xs uppercase tracking-widest font-bold mb-1">P-V Diagram</h3>
                <div class="flex-grow relative border-l-[3px] border-b-[3px] border-slate-800">
                    <span class="absolute -left-4 -top-2 text-slate-800 text-[10px] font-bold">P</span>
                    <span class="absolute -right-2 -bottom-5 text-slate-800 text-[10px] font-bold">V</span>
                    <canvas id="pv-canvas"></canvas>
                </div>
            </div>

            <!-- Process Mode Selector (Right) -->
            <div class="sketchy-panel p-2 pointer-events-auto flex flex-col gap-1.5 min-w-[160px]">
                <h3 class="text-slate-800 text-[10px] uppercase tracking-widest font-bold text-center mb-1">Process</h3>
                <button onclick="setMode('isobaric')" id="btn-mode-isobaric" class="mode-btn active px-3 py-1.5 text-sm font-bold text-slate-900 text-left">
                    Isobaric <span class="text-[10px] font-normal opacity-70 block">(Const. P)</span>
                </button>
                <button onclick="setMode('isochoric')" id="btn-mode-isochoric" class="mode-btn px-3 py-1.5 text-sm font-bold text-slate-900 text-left">
                    Isochoric <span class="text-[10px] font-normal opacity-70 block">(Const. V)</span>
                </button>
                <button onclick="setMode('isothermal')" id="btn-mode-isothermal" class="mode-btn px-3 py-1.5 text-sm font-bold text-slate-900 text-left">
                    Isothermal <span class="text-[10px] font-normal opacity-70 block">(Const. T)</span>
                </button>
                <button onclick="setMode('adiabatic')" id="btn-mode-adiabatic" class="mode-btn px-3 py-1.5 text-sm font-bold text-slate-900 text-left">
                    Adiabatic <span class="text-[10px] font-normal opacity-70 block">(No Q)</span>
                </button>
            </div>

        </div>

        <!-- Middle Controls -->
        <div class="w-full flex justify-between items-center px-4 md:px-8 pointer-events-none mt-auto mb-4">
            <!-- Thermal & Action Buttons -->
            <div class="pointer-events-auto flex gap-4" id="action-buttons-container">
                <button id="btn-heat" class="sketchy-btn bg-orange-50 flex flex-col items-center justify-center w-24 h-24 md:w-28 md:h-28 touch-none select-none">
                    <span class="text-3xl md:text-4xl mb-1 pointer-events-none">🔥</span>
                    <span class="text-orange-700 font-bold text-[10px] md:text-xs uppercase tracking-widest pointer-events-none">Add Heat</span>
                </button>
                
                <button id="btn-cool" class="sketchy-btn bg-cyan-50 flex flex-col items-center justify-center w-24 h-24 md:w-28 md:h-28 touch-none select-none">
                    <span class="text-3xl md:text-4xl mb-1 pointer-events-none">❄️</span>
                    <span class="text-cyan-700 font-bold text-[10px] md:text-xs uppercase tracking-widest pointer-events-none">Add Ice</span>
                </button>

                <button id="btn-slam" class="sketchy-btn bg-purple-50 flex flex-col items-center justify-center w-24 h-24 md:w-28 md:h-28 touch-none select-none" style="display: none;">
                    <span class="text-3xl md:text-4xl mb-1 pointer-events-none">🔨</span>
                    <span class="text-purple-700 font-bold text-[10px] md:text-xs uppercase tracking-widest pointer-events-none text-center leading-tight">Slam<br>Piston</span>
                </button>
            </div>
        </div>

        <!-- 3D Tracking Labels Layer -->
        <div id="labels-container" class="absolute top-0 left-0 w-full h-full pointer-events-none overflow-hidden z-0">
            <div id="label-w" class="absolute opacity-0 transition-opacity duration-300 transform -translate-y-1/2 flex items-center z-10">
                <div class="w-0 h-0 border-t-[6px] border-b-[6px] border-r-[8px] border-t-transparent border-b-transparent transition-colors duration-300" id="arrow-w"></div>
                <div class="sketchy-panel px-3 py-2 text-xs md:text-sm font-bold whitespace-nowrap ml-1 flex flex-col items-start" id="text-w"></div>
            </div>
            <div id="label-u" class="absolute opacity-0 transition-opacity duration-300 transform -translate-x-full -translate-y-1/2 flex items-center z-10">
                <div class="sketchy-panel px-3 py-2 text-xs md:text-sm font-bold whitespace-nowrap mr-1 flex flex-col items-end" id="text-u"></div>
                <div class="w-0 h-0 border-t-[6px] border-b-[6px] border-l-[8px] border-t-transparent border-b-transparent transition-colors duration-300" id="arrow-u"></div>
            </div>
            <div id="label-q" class="absolute opacity-0 transition-opacity duration-300 transform -translate-y-1/2 flex items-center z-10">
                <div class="w-0 h-0 border-t-[6px] border-b-[6px] border-r-[8px] border-t-transparent border-b-transparent transition-colors duration-300" id="arrow-q"></div>
                <div class="sketchy-panel px-3 py-2 text-xs md:text-sm font-bold whitespace-nowrap ml-1 flex flex-col items-start" id="text-q"></div>
            </div>
        </div>

        <!-- Dynamic Equation Panel (Bottom) -->
        <div class="sketchy-panel px-8 py-5 pointer-events-auto flex flex-col items-center gap-1 mx-4 md:mx-auto md:min-w-[500px]" id="equation-panel">
            <div class="flex flex-wrap items-center justify-center gap-3 md:gap-5 text-3xl md:text-5xl lg:text-5xl font-black text-slate-800 py-1" id="equation-container">
                <div id="term-q" class="eq-term text-orange-600 flex flex-col items-center">ΔQ</div>
                <div id="sign-1" class="eq-term text-slate-800">=</div>
                <div id="term-u" class="eq-term text-blue-600 flex flex-col items-center">ΔU</div>
                <div id="sign-2" class="eq-term text-slate-800">+</div>
                <div id="term-w" class="eq-term text-green-600 flex flex-col items-center">ΔW</div>
            </div>
            <h3 class="text-slate-600 font-bold uppercase tracking-widest text-[10px] md:text-xs mt-2 transition-colors text-center" id="status-text">
                System Status: Equilibrium
            </h3>
        </div>

    </div>

    <script>
        let scene, camera, renderer, controls, effect;
        let pistonGroup, gasParticles, fireParticles, fireLight, iceMesh, iceLight;
        let insulationMesh, lockMeshes = [];
        let pvCanvas, pvCtx;
        let gradientTexture;
        
        // App State
        let currentMode = 'isobaric';
        let isDragging = false;
        let isHeating = false;
        let isCooling = false;
        let isSlamming = false;
        
        // Simulation Constants
        const CYLINDER_RADIUS = 4;
        const MAX_HEIGHT = 14;
        const MIN_HEIGHT = 3;
        let currentPistonHeight = 8;
        let targetPistonHeight = 8;
        let internalTempCounter = 1.0; 

        const statusText = document.getElementById('status-text');
        const eqPanel = document.getElementById('equation-panel');
        const termQ = document.getElementById('term-q');
        const sign1 = document.getElementById('sign-1');
        const termU = document.getElementById('term-u');
        const sign2 = document.getElementById('sign-2');
        const termW = document.getElementById('term-w');
        
        const btnHeat = document.getElementById('btn-heat');
        const btnCool = document.getElementById('btn-cool');
        const btnSlam = document.getElementById('btn-slam');

        window.onload = function() {
            initThreeJS();
            initPVGraph();
            setupInteractions();
            setMode('isobaric'); 
            animate();
        };

        function initThreeJS() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            
            // Set bright white background & fog
            scene.background = new THREE.Color(0xf1f5f9); // slate-100
            scene.fog = new THREE.FogExp2(0xf1f5f9, 0.015);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 48);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // Initialize Toon Outline Effect
            effect = new THREE.OutlineEffect(renderer, {
                defaultThickness: 0.008,
                defaultColor: [0, 0, 0],
                defaultAlpha: 0.8,
                defaultKeepAlive: true
            });

            // Limited Viewport OrbitControls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; 
            controls.dampingFactor = 0.05;
            controls.enablePan = false;
            controls.minPolarAngle = Math.PI / 4; 
            controls.maxPolarAngle = Math.PI / 2 - 0.05; 
            controls.minDistance = 25; 
            controls.maxDistance = 70; 
            controls.target.set(0, 5, 0);

            // Brighter Lighting for the white scene
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            // Setup Technical Grid
            const gridHelper = new THREE.GridHelper(150, 75, 0x94a3b8, 0xcbd5e1);
            gridHelper.position.y = -0.3; // Just below the base
            scene.add(gridHelper);

            // Create Toon Gradient Texture for cel shading
            const gradientCanvas = document.createElement('canvas');
            gradientCanvas.width = 4; gradientCanvas.height = 1;
            const gradientCtx = gradientCanvas.getContext('2d');
            gradientCtx.fillStyle = '#404040'; gradientCtx.fillRect(0, 0, 1, 1);
            gradientCtx.fillStyle = '#808080'; gradientCtx.fillRect(1, 0, 1, 1);
            gradientCtx.fillStyle = '#c0c0c0'; gradientCtx.fillRect(2, 0, 1, 1);
            gradientCtx.fillStyle = '#ffffff'; gradientCtx.fillRect(3, 0, 1, 1);
            gradientTexture = new THREE.CanvasTexture(gradientCanvas);
            gradientTexture.magFilter = THREE.NearestFilter;
            gradientTexture.minFilter = THREE.NearestFilter;

            // Cylinder (Lightened for white BG)
            const cylinderGeo = new THREE.CylinderGeometry(CYLINDER_RADIUS, CYLINDER_RADIUS, MAX_HEIGHT, 32, 1, true);
            const cylinderMat = new THREE.MeshToonMaterial({
                color: 0xbae6fd, transparent: true, opacity: 0.25, side: THREE.DoubleSide, depthWrite: false, gradientMap: gradientTexture
            });
            const glassContainer = new THREE.Mesh(cylinderGeo, cylinderMat);
            glassContainer.position.y = MAX_HEIGHT / 2;
            scene.add(glassContainer);

            // Adiabatic Insulation
            const insulationGeo = new THREE.CylinderGeometry(CYLINDER_RADIUS + 0.3, CYLINDER_RADIUS + 0.3, MAX_HEIGHT, 32, 1, true);
            const insulationMat = new THREE.MeshToonMaterial({
                color: 0xf97316, transparent: true, opacity: 0.6, side: THREE.DoubleSide, gradientMap: gradientTexture
            });
            insulationMesh = new THREE.Mesh(insulationGeo, insulationMat);
            insulationMesh.position.y = MAX_HEIGHT / 2;
            insulationMesh.visible = false;
            scene.add(insulationMesh);

            // Base
            const baseGeo = new THREE.CylinderGeometry(CYLINDER_RADIUS + 0.5, CYLINDER_RADIUS + 0.5, 0.5, 32);
            const baseMat = new THREE.MeshToonMaterial({ color: 0x334155, gradientMap: gradientTexture });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = -0.25;
            scene.add(base);

            // Piston Assembly
            pistonGroup = new THREE.Group();
            const pistonGeo = new THREE.CylinderGeometry(CYLINDER_RADIUS - 0.1, CYLINDER_RADIUS - 0.1, 0.8, 32);
            const pistonMat = new THREE.MeshToonMaterial({ color: 0x94a3b8, gradientMap: gradientTexture });
            const piston = new THREE.Mesh(pistonGeo, pistonMat);
            pistonGroup.add(piston);

            const rodGeo = new THREE.CylinderGeometry(0.5, 0.5, 12, 16);
            const rod = new THREE.Mesh(rodGeo, pistonMat);
            rod.position.y = 6;
            pistonGroup.add(rod);

            const handleGeo = new THREE.TorusGeometry(1.5, 0.4, 16, 32);
            const handle = new THREE.Mesh(handleGeo, pistonMat);
            handle.position.y = 12;
            handle.rotation.y = Math.PI / 2;
            pistonGroup.add(handle);

            // Isochoric Volume Locks
            for(let i=0; i<4; i++) {
                const lockGeo = new THREE.BoxGeometry(1.5, 0.5, 1.5);
                const lockMat = new THREE.MeshToonMaterial({ color: 0xef4444, gradientMap: gradientTexture });
                const lock = new THREE.Mesh(lockGeo, lockMat);
                lock.position.y = 0.4;
                lock.position.x = Math.cos(i * Math.PI/2) * (CYLINDER_RADIUS - 0.5);
                lock.position.z = Math.sin(i * Math.PI/2) * (CYLINDER_RADIUS - 0.5);
                lock.visible = false;
                pistonGroup.add(lock);
                lockMeshes.push(lock);
            }

            pistonGroup.position.y = currentPistonHeight;
            scene.add(pistonGroup);

            setupGasParticles();
            setupThermalVisuals();

            window.addEventListener('resize', onWindowResize, false);
        }

        function setupGasParticles() {
            const particleCount = 600;
            const particleGeo = new THREE.BufferGeometry();
            const particlePos = new Float32Array(particleCount * 3);
            const particleVels = [];

            for(let i = 0; i < particleCount; i++) {
                particlePos[i*3] = (Math.random() - 0.5) * (CYLINDER_RADIUS * 1.5);
                particlePos[i*3+1] = Math.random() * currentPistonHeight;
                particlePos[i*3+2] = (Math.random() - 0.5) * (CYLINDER_RADIUS * 1.5);
                particleVels.push({ x: (Math.random() - 0.5)*0.3, y: (Math.random() - 0.5)*0.3, z: (Math.random() - 0.5)*0.3 });
            }

            particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
            
            const circleCanvas = document.createElement('canvas');
            circleCanvas.width = 32; circleCanvas.height = 32;
            const context = circleCanvas.getContext('2d');
            const gradient = context.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.5, 'rgba(255,255,255,0.8)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            context.fillStyle = gradient;
            context.fillRect(0,0,32,32);
            
            // Removed AdditiveBlending so it shows up on white background
            const pMat = new THREE.PointsMaterial({
                color: 0xff4400, size: 0.8, map: new THREE.CanvasTexture(circleCanvas), transparent: true, opacity: 0.8, depthWrite: false, depthTest: true
            });
            gasParticles = new THREE.Points(particleGeo, pMat);
            gasParticles.userData.velocities = particleVels;
            gasParticles.frustumCulled = false; 
            scene.add(gasParticles);
        }

        function setupThermalVisuals() {
            // Fire
            const fireGeo = new THREE.BufferGeometry();
            const firePos = new Float32Array(200 * 3);
            for(let i=0; i<200; i++) {
                firePos[i*3] = (Math.random() - 0.5) * 6;
                firePos[i*3+1] = -3 + Math.random() * 2.5; 
                firePos[i*3+2] = (Math.random() - 0.5) * 6;
            }
            fireGeo.setAttribute('position', new THREE.BufferAttribute(firePos, 3));
            // Standard blending for visibility on white background
            fireParticles = new THREE.Points(fireGeo, new THREE.PointsMaterial({
                color: 0xff8800, size: 1.2, transparent: true, opacity: 0, depthWrite: false
            }));
            fireParticles.frustumCulled = false;
            scene.add(fireParticles);
            
            fireLight = new THREE.PointLight(0xff5500, 0, 20);
            fireLight.position.set(0, -1, 0);
            scene.add(fireLight);

            // Ice
            const iceGeo = new THREE.CylinderGeometry(CYLINDER_RADIUS+0.2, CYLINDER_RADIUS+1, 2, 8);
            const iceMat = new THREE.MeshToonMaterial({
                color: 0x00ffff, transparent: true, opacity: 0, depthWrite: false, gradientMap: gradientTexture
            });
            iceMesh = new THREE.Mesh(iceGeo, iceMat);
            iceMesh.position.y = -3;
            scene.add(iceMesh);

            iceLight = new THREE.PointLight(0x00aaff, 0, 20);
            iceLight.position.set(0, -1, 0);
            scene.add(iceLight);
        }

        function initPVGraph() {
            pvCanvas = document.getElementById('pv-canvas');
            pvCtx = pvCanvas.getContext('2d');
            const rect = pvCanvas.getBoundingClientRect();
            pvCanvas.width = rect.width * 2;
            pvCanvas.height = rect.height * 2;
            pvCtx.scale(2,2);
        }

        // Mode Switching Logic
        window.setMode = function(mode) {
            currentMode = mode;
            isDragging = false;
            isHeating = false;
            isCooling = false;
            isSlamming = false;
            internalTempCounter = 1.0; 
            targetPistonHeight = 8;
            
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-mode-${mode}`).classList.add('active');

            btnHeat.style.display = (mode === 'adiabatic') ? 'none' : 'flex';
            btnCool.style.display = (mode === 'adiabatic') ? 'none' : 'flex';
            btnSlam.style.display = (mode === 'adiabatic') ? 'flex' : 'none';
            
            insulationMesh.visible = (mode === 'adiabatic');
            lockMeshes.forEach(m => m.visible = (mode === 'isochoric'));

            updateEquationUI('idle');
            drawPVGraph();
        };

        function setupInteractions() {
            btnHeat.addEventListener('pointerdown', () => { 
                if (btnHeat.style.display === 'none') return;
                isHeating = true; updateEquationUI('heating'); 
            });
            window.addEventListener('pointerup', () => { 
                if(isHeating) { isHeating = false; setTimeout(() => { if(!isDragging && !isCooling) updateEquationUI('idle'); }, 500); }
            });

            btnCool.addEventListener('pointerdown', () => { 
                if (btnCool.style.display === 'none') return;
                isCooling = true; updateEquationUI('cooling'); 
            });
            window.addEventListener('pointerup', () => { 
                if(isCooling) { isCooling = false; setTimeout(() => { if(!isDragging && !isHeating) updateEquationUI('idle'); }, 500); }
            });

            btnSlam.addEventListener('pointerdown', () => {
                if (btnSlam.style.display === 'none') return;
                isSlamming = true;
                targetPistonHeight = MIN_HEIGHT + 1; 
                updateEquationUI('slamming');
            });
            window.addEventListener('pointerup', () => {
                if(isSlamming) { isSlamming = false; setTimeout(() => { if(!isDragging) updateEquationUI('idle'); }, 1000); }
            });

            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            let dragPlane = new THREE.Plane();
            let offset = new THREE.Vector3();

            window.addEventListener('pointerdown', (e) => {
                if(e.target !== renderer.domElement || currentMode === 'isochoric' || isSlamming) return;
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                if (raycaster.intersectObject(pistonGroup, true).length > 0) {
                    isDragging = true; controls.enabled = false; document.body.style.cursor = 'grabbing';
                    const cameraDir = new THREE.Vector3();
                    camera.getWorldDirection(cameraDir);
                    dragPlane.setFromNormalAndCoplanarPoint(cameraDir.negate(), pistonGroup.position);
                    raycaster.ray.intersectPlane(dragPlane, offset);
                    offset.sub(pistonGroup.position);
                }
            });

            window.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const point = new THREE.Vector3();
                if(raycaster.ray.intersectPlane(dragPlane, point)) {
                    const newY = point.y - offset.y;
                    if (newY < currentPistonHeight - 0.1) updateEquationUI('compressing');
                    else if (newY > currentPistonHeight + 0.1) updateEquationUI('expanding_drag');
                    targetPistonHeight = Math.max(MIN_HEIGHT, Math.min(MAX_HEIGHT, newY));
                    currentPistonHeight = targetPistonHeight; 
                }
            });

            window.addEventListener('pointerup', () => {
                if (isDragging) {
                    isDragging = false; controls.enabled = true; document.body.style.cursor = 'default';
                    setTimeout(() => { if(!isDragging && !isHeating && !isCooling) updateEquationUI('idle'); }, 800);
                }
            });
        }

        function setLabel(type, textHTML, colorHex, show) {
            const el = document.getElementById(`label-${type}`);
            const textEl = document.getElementById(`text-${type}`);
            const arrowEl = document.getElementById(`arrow-${type}`);
            if (!show) { el.style.opacity = '0'; return; }
            
            el.style.opacity = '1';
            textEl.innerHTML = textHTML; 
            textEl.style.borderColor = colorHex; // Tint sketchy border
            textEl.style.color = '#0f172a'; // Ensure text is dark and readable
            textEl.style.boxShadow = `4px 4px 0px ${colorHex}`; // Tint sketchy shadow
            
            if(type === 'u') arrowEl.style.borderLeftColor = colorHex;
            else arrowEl.style.borderRightColor = colorHex;
        }

        function formatTerm(text, isZero, signOverride = '') {
            if(isZero) return `<span class="line-through opacity-40">${text}</span><span class="block text-[10px] md:text-xs text-slate-500 font-normal opacity-80">= 0</span>`;
            if(signOverride) return `<span class="font-black">${signOverride}${text}</span>`;
            return text;
        }

        let currentState = 'idle';
        function updateEquationUI(state) {
            if (currentState === state) return;
            currentState = state;

            eqPanel.className = "sketchy-panel px-6 md:px-8 py-4 pointer-events-auto flex flex-col items-center gap-1 mx-4 md:mx-auto md:min-w-[500px]";
            termQ.className = "eq-term text-orange-600 flex flex-col items-center";
            termU.className = "eq-term text-blue-600 flex flex-col items-center";
            termW.className = "eq-term text-green-600 flex flex-col items-center";
            
            termQ.innerHTML = formatTerm('ΔQ', currentMode === 'adiabatic');
            termU.innerHTML = formatTerm('ΔU', currentMode === 'isothermal');
            termW.innerHTML = formatTerm('ΔW', currentMode === 'isochoric');
            sign1.innerText = "="; sign2.innerText = "+";

            const setPanelColor = (color) => {
                eqPanel.style.borderColor = color;
                eqPanel.style.boxShadow = `6px 6px 0px ${color}`;
            };

            if (state === 'idle') {
                setPanelColor('#1e293b');
                statusText.innerText = `System Status: Equilibrium (${currentMode.toUpperCase()})`;
                setLabel('q', '', '', false); setLabel('u', '', '', false); setLabel('w', '', '', false);
                return;
            }

            if (currentMode === 'isobaric') {
                if (state === 'heating') {
                    setPanelColor('#f97316');
                    statusText.innerText = "Heating: All components expand/increase (+)";
                    termQ.innerHTML = formatTerm('ΔQ', false, '+'); termU.innerHTML = formatTerm('ΔU', false, '+'); termW.innerHTML = formatTerm('ΔW', false, '+');
                    termQ.className += " scale-110 text-orange-600"; termU.className += " text-red-600"; termW.className += " text-green-600";
                    setLabel('q', '🔥 Heat in (+ΔQ)', '#f97316', true);
                    setLabel('u', '📈 Energy rises (+ΔU)', '#ef4444', true);
                    setLabel('w', '⬆️ Volume expands (+ΔW)', '#22c55e', true);
                } else if (state === 'cooling') {
                    setPanelColor('#06b6d4');
                    statusText.innerText = "Cooling: All components contract/decrease (-)";
                    termQ.innerHTML = formatTerm('ΔQ', false, '-'); termU.innerHTML = formatTerm('ΔU', false, '-'); termW.innerHTML = formatTerm('ΔW', false, '-');
                    termQ.className += " scale-110 text-cyan-600"; termU.className += " text-blue-600"; termW.className += " text-slate-500";
                    setLabel('q', '❄️ Heat out (-ΔQ)', '#06b6d4', true);
                    setLabel('u', '📉 Energy drops (-ΔU)', '#3b82f6', true);
                    setLabel('w', '⬇️ Volume shrinks (-ΔW)', '#64748b', true);
                } else if (state === 'compressing') {
                    setPanelColor('#ef4444');
                    statusText.innerText = "Work done ON gas converts to Internal Energy";
                    termW.className += " text-red-600 scale-110"; termU.className += " text-red-600 scale-110"; termQ.className += " opacity-40";
                    setLabel('w', '⬇️ Piston pushed DOWN', '#ef4444', true);
                    setLabel('u', '📈 Energy INCREASES', '#ef4444', true);
                    setLabel('q', '', '', false);
                } else if (state === 'expanding_drag') {
                    setPanelColor('#3b82f6');
                    statusText.innerText = "Gas uses energy to expand";
                    termW.className += " scale-110 text-green-600"; termU.className += " text-blue-600 scale-110"; termQ.className += " opacity-40";
                    setLabel('w', '⬆️ Piston moves UP', '#22c55e', true);
                    setLabel('u', '📉 Temp drops to fuel work', '#3b82f6', true);
                    setLabel('q', '', '', false);
                }
            } 
            
            else if (currentMode === 'isochoric') { 
                if (state === 'heating') {
                    setPanelColor('#ef4444');
                    statusText.innerText = "All Heat goes directly to Internal Energy";
                    termQ.className += " scale-110 text-orange-600"; termU.className += " text-red-600 scale-110";
                    setLabel('q', '🔥 Heat transfers into gas', '#f97316', true);
                    setLabel('u', '💥 Temp skyrockets (no expansion)', '#ef4444', true);
                    setLabel('w', '❌ Volume locked', '#64748b', true);
                } else if (state === 'cooling') {
                    setPanelColor('#06b6d4');
                    statusText.innerText = "Internal Energy drops as heat leaves";
                    termQ.className += " scale-110 text-cyan-600"; termU.className += " text-blue-600 scale-110";
                    setLabel('q', '❄️ Heat leaves gas', '#06b6d4', true);
                    setLabel('u', '🥶 Temp drops rapidly', '#3b82f6', true);
                    setLabel('w', '❌ Volume locked', '#64748b', true);
                }
            }

            else if (currentMode === 'isothermal') { 
                if (state === 'heating') {
                    setPanelColor('#22c55e');
                    statusText.innerText = "Heat (+Q) perfectly converts to Work BY Gas (+W)";
                    termQ.innerHTML = formatTerm('ΔQ', false, '+'); termW.innerHTML = formatTerm('ΔW', false, '+');
                    termQ.className += " scale-110 text-orange-600"; termW.className += " scale-110 text-green-600";
                    setLabel('q', '🔥 Heat added IN', '#f97316', true);
                    setLabel('u', '🌡️ Temp locked (ΔU=0)', '#3b82f6', true);
                    setLabel('w', '⬆️ Perfect expansion', '#22c55e', true);
                } else if (state === 'cooling') {
                    setPanelColor('#06b6d4');
                    statusText.innerText = "Work ON Gas (-W) perfectly expels Heat (-Q)";
                    termQ.innerHTML = formatTerm('ΔQ', false, '-'); termW.innerHTML = formatTerm('ΔW', false, '-');
                    termQ.className += " scale-110 text-cyan-600"; termW.className += " scale-110 text-slate-500";
                    setLabel('q', '❄️ Heat flows OUT', '#06b6d4', true);
                    setLabel('u', '🌡️ Temp locked (ΔU=0)', '#3b82f6', true);
                    setLabel('w', '⬇️ Atmosphere compresses', '#64748b', true);
                } else if (state === 'compressing') {
                    setPanelColor('#06b6d4');
                    statusText.innerText = "Work done ON gas directly expels Heat OUT";
                    termQ.innerHTML = formatTerm('ΔQ', false, '-'); termW.innerHTML = formatTerm('ΔW', false, '-');
                    termW.className += " scale-110 text-slate-500"; termQ.className += " scale-110 text-cyan-600";
                    setLabel('w', '⬇️ You do Work ON gas (-W)', '#64748b', true);
                    setLabel('u', '🌡️ Temp locked (ΔU=0)', '#3b82f6', true);
                    setLabel('q', '➡️ Heat expelled OUT (-Q)', '#06b6d4', true);
                } else if (state === 'expanding_drag') {
                    setPanelColor('#f97316');
                    statusText.innerText = "Gas expanding MUST suck Heat IN to not cool down";
                    termQ.innerHTML = formatTerm('ΔQ', false, '+'); termW.innerHTML = formatTerm('ΔW', false, '+');
                    termW.className += " scale-110 text-green-600"; termQ.className += " scale-110 text-orange-600";
                    setLabel('w', '⬆️ Gas does Work (+W)', '#22c55e', true);
                    setLabel('u', '🌡️ Temp locked (ΔU=0)', '#3b82f6', true);
                    setLabel('q', '⬅️ Heat sucked IN (+Q)', '#f97316', true);
                }
            }

            else if (currentMode === 'adiabatic') { 
                if (state === 'compressing' || state === 'slamming') {
                    setPanelColor('#ef4444');
                    statusText.innerText = state==='slamming' ? "RAPID COMPRESSION: Massive Temp Spike!" : "Work goes strictly into heating the gas";
                    termW.className += " text-red-600 scale-110"; termU.className += (state==='slamming'?" text-red-600 scale-150 animate-pulse":" text-red-600 scale-110");
                    setLabel('w', '⬇️ Intense compression (-W)', '#ef4444', true);
                    setLabel('u', '💥 Heat trapped, Temp spikes (+ΔU)', '#ef4444', true);
                    setLabel('q', '🧱 Perfect Insulation', '#f97316', true);
                } else if (state === 'expanding_drag') {
                    setPanelColor('#3b82f6');
                    statusText.innerText = "Expansion rapidly cools the gas";
                    termW.className += " scale-110 text-green-600"; termU.className += " text-blue-600 scale-110";
                    setLabel('w', '⬆️ Rapid expansion (+W)', '#22c55e', true);
                    setLabel('u', '🥶 Rapid cooling (-ΔU)', '#3b82f6', true);
                    setLabel('q', '🧱 Perfect Insulation', '#f97316', true);
                }
            }
        }

        function updateLabelsPosition() {
            if (currentState === 'idle') return;

            const camRight = new THREE.Vector3(1, 0, 0);
            camRight.applyQuaternion(camera.quaternion);

            const updatePos = (vector, elementId) => {
                vector.project(camera);
                if (vector.z > 1) { 
                    document.getElementById(elementId).style.display = 'none';
                    return;
                }
                document.getElementById(elementId).style.display = 'flex';
                const x = (vector.x * .5 + .5) * window.innerWidth;
                const y = (vector.y * -.5 + .5) * window.innerHeight;
                document.getElementById(elementId).style.left = `${x}px`;
                document.getElementById(elementId).style.top = `${y}px`;
            };

            const wPos = new THREE.Vector3(0, currentPistonHeight, 0).addScaledVector(camRight, CYLINDER_RADIUS);
            updatePos(wPos, 'label-w');

            const uPos = new THREE.Vector3(0, currentPistonHeight / 2, 0).addScaledVector(camRight, -CYLINDER_RADIUS);
            updatePos(uPos, 'label-u');

            if (currentState === 'heating' || currentState === 'cooling' || currentMode === 'isothermal') {
                const qPos = new THREE.Vector3(0, -1.5, 0).addScaledVector(camRight, CYLINDER_RADIUS);
                updatePos(qPos, 'label-q');
            }
        }

        function drawPVGraph() {
            if(!pvCtx) return;
            const w = pvCanvas.width/2;
            const h = pvCanvas.height/2;
            pvCtx.clearRect(0,0,w,h);

            // Sketchy Thick Curve
            pvCtx.strokeStyle = '#1e293b'; 
            pvCtx.lineWidth = 3;
            pvCtx.lineCap = 'round';
            pvCtx.lineJoin = 'round';
            pvCtx.beginPath();
            
            const vNormalized = (currentPistonHeight - MIN_HEIGHT) / (MAX_HEIGHT - MIN_HEIGHT); 
            const drawV = 10 + vNormalized * (w - 20);
            let drawP = h/2;

            if(currentMode === 'isobaric') {
                pvCtx.moveTo(10, h/2); pvCtx.lineTo(w-10, h/2);
            } 
            else if(currentMode === 'isochoric') {
                const fixedV = 10 + ((8 - MIN_HEIGHT)/(MAX_HEIGHT - MIN_HEIGHT)) * (w-20);
                pvCtx.moveTo(fixedV, 10); pvCtx.lineTo(fixedV, h-10);
                drawP = h - 10 - (internalTempCounter - 0.5) * (h-20);
            }
            else if(currentMode === 'isothermal') {
                for(let x=10; x<w-10; x++) {
                    let v = x/(w-20);
                    let p = h - (0.2/v)*h;
                    if(x===10) pvCtx.moveTo(x, Math.max(10, Math.min(h-10, p)));
                    else pvCtx.lineTo(x, Math.max(10, Math.min(h-10, p)));
                }
                drawP = h - (0.2/Math.max(0.1, vNormalized))*h;
            }
            else if(currentMode === 'adiabatic') {
                for(let x=10; x<w-10; x++) {
                    let v = x/(w-20);
                    let p = h - (0.1/Math.pow(v, 1.4))*h;
                    if(x===10) pvCtx.moveTo(x, Math.max(10, Math.min(h-10, p)));
                    else pvCtx.lineTo(x, Math.max(10, Math.min(h-10, p)));
                }
                drawP = h - (0.1/Math.pow(Math.max(0.1, vNormalized), 1.4))*h;
            }
            pvCtx.stroke();

            // Draw Live Dot
            drawP = Math.max(10, Math.min(h-10, drawP));
            pvCtx.fillStyle = '#3b82f6'; 
            if(currentState === 'heating') pvCtx.fillStyle = '#ef4444';
            if(currentState === 'cooling') pvCtx.fillStyle = '#06b6d4';
            if(currentState === 'slamming') pvCtx.fillStyle = '#c084fc';
            
            pvCtx.beginPath();
            pvCtx.arc(currentMode==='isochoric' ? 10+((8-MIN_HEIGHT)/(MAX_HEIGHT-MIN_HEIGHT))*(w-20) : drawV, drawP, 6, 0, Math.PI*2);
            pvCtx.fill();
            pvCtx.strokeStyle = '#1e293b'; // Sketchy dot outline
            pvCtx.lineWidth = 2;
            pvCtx.stroke();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            if (effect) effect.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Thermal Logic processing
            if (isHeating && !isDragging && currentMode !== 'adiabatic') {
                if (currentMode !== 'isochoric') targetPistonHeight = Math.min(MAX_HEIGHT, targetPistonHeight + 0.08);
                else internalTempCounter += 0.03; 
            }
            if (isCooling && !isDragging && currentMode !== 'adiabatic') {
                if (currentMode !== 'isochoric') targetPistonHeight = Math.max(MIN_HEIGHT, targetPistonHeight - 0.08);
                else internalTempCounter = Math.max(0.2, internalTempCounter - 0.03); 
            }
            if (isSlamming) {
                 targetPistonHeight = Math.max(MIN_HEIGHT, targetPistonHeight - 0.5); 
            }

            // Smooth piston movement
            if (!isDragging && !isSlamming) {
                if (currentMode === 'isochoric') currentPistonHeight += (8 - currentPistonHeight) * 0.1; 
                else currentPistonHeight += (targetPistonHeight - currentPistonHeight) * 0.1;
            } else if (isSlamming) {
                 currentPistonHeight += (targetPistonHeight - currentPistonHeight) * 0.4; 
            }
            pistonGroup.position.y = currentPistonHeight;

            updateLabelsPosition();
            drawPVGraph(); 

            // Visual FX
            if (isHeating && currentMode !== 'adiabatic') {
                fireParticles.material.opacity = THREE.MathUtils.lerp(fireParticles.material.opacity, 0.8, 0.1);
                fireLight.intensity = THREE.MathUtils.lerp(fireLight.intensity, 3, 0.1);
                const fPos = fireParticles.geometry.attributes.position.array;
                for(let i=0; i < fPos.length/3; i++) {
                    fPos[i*3+1] += 0.05 + Math.random()*0.05; 
                    if (fPos[i*3+1] > -0.5) fPos[i*3+1] = -3; 
                }
                fireParticles.geometry.attributes.position.needsUpdate = true;
            } else {
                fireParticles.material.opacity = THREE.MathUtils.lerp(fireParticles.material.opacity, 0, 0.1);
                fireLight.intensity = THREE.MathUtils.lerp(fireLight.intensity, 0, 0.1);
                if (!isHeating && currentMode === 'isochoric') internalTempCounter += (1.0 - internalTempCounter) * 0.02;
            }

            if (isCooling && currentMode !== 'adiabatic') {
                iceMesh.material.opacity = THREE.MathUtils.lerp(iceMesh.material.opacity, 0.7, 0.1);
                iceMesh.position.y = THREE.MathUtils.lerp(iceMesh.position.y, -1.2, 0.1);
                iceLight.intensity = THREE.MathUtils.lerp(iceLight.intensity, 2.5, 0.1);
            } else {
                iceMesh.material.opacity = THREE.MathUtils.lerp(iceMesh.material.opacity, 0, 0.1);
                iceMesh.position.y = THREE.MathUtils.lerp(iceMesh.position.y, -3, 0.1);
                iceLight.intensity = THREE.MathUtils.lerp(iceLight.intensity, 0, 0.1);
            }

            // Gas Particles Logic
            const positions = gasParticles.geometry.attributes.position.array;
            const velocities = gasParticles.userData.velocities;
            
            let tempMultiplier = 1.0;
            let targetColor = new THREE.Color(0xff4400); 
            
            if (currentMode === 'isothermal') {
                tempMultiplier = 1.0; 
                targetColor.setHex(0xffaa00);
            } 
            else if (currentMode === 'isochoric') {
                tempMultiplier = internalTempCounter; 
                if (isHeating) targetColor.setHex(0xff0000); 
                if (isCooling) targetColor.setHex(0x0088ff); 
            }
            else { 
                tempMultiplier = (currentPistonHeight / MAX_HEIGHT) + 0.5;
                if(isDragging && currentState === 'compressing') {
                    tempMultiplier += (currentMode === 'adiabatic' ? 2.5 : 1.5); 
                    targetColor.setHex(0xff0000); 
                }
                if(isDragging && currentState === 'expanding_drag') {
                    tempMultiplier = Math.max(0.1, tempMultiplier - (currentMode === 'adiabatic' ? 0.8 : 0.5)); 
                    targetColor.setHex(0x0088ff); 
                }
                if(isHeating) { tempMultiplier += 1.0; targetColor.setHex(0xff0000); }
                if(isCooling) { tempMultiplier = Math.max(0.2, tempMultiplier - 0.8); targetColor.setHex(0x0088ff); }
                if(isSlamming) { tempMultiplier += 4.0; targetColor.setHex(0xff00ff); }
            }

            gasParticles.material.color.lerp(targetColor, 0.1);

            for(let i = 0; i < positions.length / 3; i++) {
                let x = positions[i*3]; let y = positions[i*3+1]; let z = positions[i*3+2];
                let v = velocities[i];

                x += v.x * tempMultiplier; y += v.y * tempMultiplier; z += v.z * tempMultiplier;

                if (Math.sqrt(x*x + z*z) > CYLINDER_RADIUS - 0.2) {
                    const angle = Math.atan2(z, x);
                    x = Math.cos(angle) * (CYLINDER_RADIUS - 0.2);
                    z = Math.sin(angle) * (CYLINDER_RADIUS - 0.2);
                    v.x *= -1; v.z *= -1;
                }
                if (y < 0.2) { y = 0.2; v.y *= -1; }
                if (y > currentPistonHeight - 0.5) { y = currentPistonHeight - 0.5; v.y *= -1; }

                positions[i*3] = x; positions[i*3+1] = y; positions[i*3+2] = z;
            }
            gasParticles.geometry.attributes.position.needsUpdate = true;

            effect.render(scene, camera);
        }
    </script>
